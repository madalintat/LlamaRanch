<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LlamaRanch Chat</title>
    <link rel="stylesheet" href="/src/chat.css" />
  </head>
  <body>
    <main id="chat">
      <div id="pool" class="pool"></div>
      <div id="log" class="log"></div>
      <form id="composer" class="composer">
        <textarea id="input" rows="1" placeholder="Ask anything…"></textarea>
        <select id="model-pick" class="model-pick"><option value="">Auto</option></select>
        <button id="send" type="submit">Send</button>
      </form>
    </main>
    <script type="module" src="/src/chat.ts"></script>
  </body>
</html>
