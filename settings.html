<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LlamaRanch Settings</title>
  </head>
  <body>
    <div id="app">
      <header class="s-head" data-tauri-drag-region>
        <img class="s-head__logo" src="/src/assets/llama.svg" alt="" width="20" height="20" />
        <span class="s-head__title serif">Settings</span>
        <div class="s-head__spacer" data-tauri-drag-region></div>
        <button class="s-head__close" id="s-close" title="Close" aria-label="Close">&times;</button>
      </header>

      <div class="s-body">

        <!-- ── Tools & connectors ─────────────────────────────── -->
        <section class="s-section">
          <div class="s-section__label label">Tools &amp; connectors</div>

          <!-- Rendered dynamically from list_tools in settings.ts -->
          <div id="s-tools-list"></div>

          <!-- MCP placeholder (Phase 3) -->
          <div class="s-row s-row--muted">
            <span class="partno s-tools-mcp-partno">—</span>
            <div class="s-row__body">
              <div class="s-row__name s-row__name--off">MCP servers</div>
              <div class="meta">Phase 3 — coming soon</div>
            </div>
            <span class="tag tag--faint">ONLINE</span>
            <div class="toggle toggle--off" aria-label="MCP disabled" title="MCP servers"></div>
          </div>

          <!-- Offline mode pill -->
          <div class="s-toggle-row" id="s-offline-row">
            <span class="led led--idle" id="s-offline-led"></span>
            <div class="s-toggle-row__body">
              <div class="s-toggle-row__name">Offline mode</div>
              <div class="s-toggle-row__sub meta">Disable all internet-reaching tools.</div>
            </div>
            <div class="toggle toggle--off" id="s-offline-toggle" role="checkbox" aria-checked="false" tabindex="0"></div>
            <input type="checkbox" id="s-offline" class="s-hidden-check" />
          </div>

          <!-- SearXNG URL -->
          <label class="s-field-wrap">
            <span class="label s-field-wrap__label">SearXNG URL (for web search)</span>
            <input id="s-searxng" class="field" type="text" placeholder="http://localhost:8888" />
          </label>

          <!-- Allowed folders -->
          <label class="s-field-wrap">
            <span class="label s-field-wrap__label">Allowed folders for file read (one per line)</span>
            <textarea id="s-allowed-dirs" class="field" rows="3"
              placeholder="/Users/you/Documents&#10;/Users/you/Projects"
              style="resize:vertical;font-family:inherit;"></textarea>
          </label>
        </section>

        <!-- ── Server ─────────────────────────────────────────── -->
        <section class="s-section">
          <div class="s-section__label label">Server</div>

          <!-- Port + Models dir two-up -->
          <div class="s-field-row s-field-row--2up">
            <label class="s-field-wrap">
              <span class="label s-field-wrap__label">Port</span>
              <input id="s-port" class="field" type="number" />
            </label>
            <label class="s-field-wrap s-field-wrap--grow">
              <span class="label s-field-wrap__label">Models directory</span>
              <input id="s-models" class="field" type="text" placeholder="~/.local/share/llamaranch" />
            </label>
          </div>

          <!-- llama-server binary -->
          <label class="s-field-wrap">
            <span class="label s-field-wrap__label">llama-server binary</span>
            <input id="s-bin" class="field" type="text" placeholder="/usr/local/bin/llama-server" />
          </label>

          <!-- Unload idle + Max models two-up -->
          <div class="s-field-row s-field-row--2up">
            <label class="s-field-wrap">
              <span class="label s-field-wrap__label">Unload idle after (s, 0=never)</span>
              <input id="s-idle" class="field" type="number" min="0" />
            </label>
            <label class="s-field-wrap">
              <span class="label s-field-wrap__label">Max models loaded</span>
              <input id="s-models-max" class="field" type="number" min="1" max="16" step="1" />
            </label>
          </div>

          <!-- HF token -->
          <label class="s-field-wrap">
            <span class="label s-field-wrap__label">Hugging Face token (optional)</span>
            <input id="s-hf" class="field" type="password" placeholder="hf_…" />
          </label>

          <!-- Expose to network -->
          <div class="s-toggle-row" id="s-expose-row">
            <span class="led led--idle" id="s-expose-led"></span>
            <div class="s-toggle-row__body">
              <div class="s-toggle-row__name">Expose to network</div>
              <div class="s-toggle-row__sub meta">Bind 0.0.0.0 — other devices can connect. Off by default.</div>
            </div>
            <div class="toggle toggle--off" id="s-expose-toggle" role="checkbox" aria-checked="false" tabindex="0"></div>
            <!-- hidden checkbox keeps config wiring unchanged -->
            <input type="checkbox" id="s-expose" class="s-hidden-check" />
          </div>

          <!-- Start on login -->
          <div class="s-toggle-row" id="s-autostart-row">
            <span class="led led--idle" id="s-autostart-led"></span>
            <div class="s-toggle-row__body">
              <div class="s-toggle-row__name">Start on login</div>
              <div class="s-toggle-row__sub meta">Launch LlamaRanch automatically at startup.</div>
            </div>
            <div class="toggle toggle--off" id="s-autostart-toggle" role="checkbox" aria-checked="false" tabindex="0"></div>
            <!-- hidden checkbox keeps config wiring unchanged -->
            <input type="checkbox" id="s-autostart" class="s-hidden-check" />
          </div>

        </section>

        <div class="error hidden" id="s-error"></div>
      </div>

      <footer class="s-foot">
        <span class="s-foot__spacer"></span>
        <button class="btn btn--ghost" id="s-cancel">Cancel</button>
        <button class="btn btn--primary" id="s-save">Save</button>
      </footer>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
