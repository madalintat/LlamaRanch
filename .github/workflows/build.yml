name: build

# Builds LlamaRanch on macOS (Apple Silicon), Linux, and Windows, x86_64 and
# arm64 (Tauri can't cross-compile, so each target builds on its own native
# runner; macOS bundles are ad-hoc signed - no Apple notarization yet). On a v* tag
# the signed installers + updater latest.json are attached to one GitHub
# Release; on manual runs they are uploaded as workflow artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # one release object so the matrix jobs don't race to create it
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.cr.outputs.result }}
    steps:
      - id: cr
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `LlamaRanch ${tag}`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: [create-release]
    # run on tags (create-release succeeded) and on manual runs (it was skipped),
    # but not if create-release actually failed. !cancelled() is required so a
    # skipped dependency doesn't auto-skip this job on manual (workflow_dispatch) runs.
    if: ${{ !cancelled() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      # Serialize the matrix. tauri-action read-modify-writes the shared
      # updater manifest (latest.json) on the draft release once per leg;
      # parallel legs clobber each other's platform entries and race the
      # asset-update API (intermittent "Not Found" 404). One leg at a time
      # keeps latest.json complete across macOS/Linux/Windows (x64 + arm64).
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest     # macOS (Apple Silicon, arm64)
          - platform: ubuntu-24.04      # Linux x86_64
          - platform: ubuntu-24.04-arm  # Linux arm64
          - platform: windows-latest    # Windows x86_64
          - platform: windows-11-arm    # Windows on Arm (arm64)
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev build-essential curl wget file \
            libssl-dev libxdo-dev patchelf xdg-utils

      - run: npm ci

      - name: Build (and upload to the release on a tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Upload installers as artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: llamaranch-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz*
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage*
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.zip*
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.zip*
          if-no-files-found: ignore

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });
