<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LlamaRanch</title>
  </head>

  <body>
    <div id="app">
      <header class="head">
        <div class="brand">
          <img class="brand__mark" id="brand-mark" alt="" />
          <span class="brand__name">Llama<b>Ranch</b></span>
        </div>
        <div class="head__spacer"></div>
        <div class="head__right">
          <div class="status status--idle" id="status">
            <span class="status__dot"></span>
            <span class="status__label" id="status-label">idle</span>
          </div>
          <button class="head__close" id="close-btn" title="Close to tray" aria-label="Close">&times;</button>
        </div>
      </header>

      <div class="update hidden" id="update">
        <span class="update__text" id="update-text">An update is available.</span>
        <button class="update__btn" id="update-now">Update</button>
        <button class="update__dismiss" id="update-later">Later</button>
      </div>

      <div class="bar">
        <button class="endpoint" id="copy" title="Copy endpoint to clipboard">
          <span class="endpoint__url" id="endpoint">http://127.0.0.1:2276/v1</span>
          <span class="endpoint__copy" id="copy-label">Copy</span>
        </button>
        <button class="btn btn--web" id="webui">Open WebUI</button>
      </div>

      <div class="error hidden" id="error"></div>

      <div class="tabs">
        <button class="tab is-active" id="tab-installed">Installed</button>
        <button class="tab" id="tab-discover">Discover</button>
      </div>

      <main class="models" id="models"></main>

      <footer class="foot">
        <span class="foot__ver" id="version">llama.cpp</span>
        <span class="foot__spacer"></span>
        <button class="btn btn--quiet" id="chat-btn">Chat</button>
        <button class="btn btn--quiet" id="settings-btn">Settings</button>
        <button class="btn btn--quiet" id="quit">Quit</button>
      </footer>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
