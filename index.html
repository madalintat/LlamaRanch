<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LlamaRanch</title>
    <script>
      (function(){var t=localStorage.getItem('lr_theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);})();
    </script>
  </head>

  <body>
    <div class="ms" id="app">

      <!-- BRAND STRIP -->
      <div class="ms-brand">
        <img class="ms-brand__mark" id="brand-mark" alt="" width="26" height="26" />
        <span class="ms-brand__name">LlamaRanch</span>
        <span class="ms-spacer"></span>
        <button class="ms-endpoint" id="copy" title="Copy endpoint to clipboard">
          <span class="ms-endpoint__dot" id="status-led"></span>
          <span id="endpoint">127.0.0.1:2276</span>
          <span class="ms-endpoint__copied" id="copy-label"></span>
        </button>
      </div>

      <!-- UPDATE BANNER -->
      <div class="update hidden" id="update">
        <span class="update__text" id="update-text">An update is available.</span>
        <button class="update__btn" id="update-now">Update</button>
        <button class="update__dismiss" id="update-later">Later</button>
      </div>

      <!-- ERROR -->
      <div class="ms-error hidden" id="error"></div>

      <!-- HERO (serving / loading / empty) — rendered by main.ts -->
      <div class="ms-hero" id="hero"></div>

      <!-- LIST -->
      <div class="ms-list">
        <div class="ms-list__label" id="list-label">Models</div>
        <main id="models"></main>
        <div class="ms-foot">
          <button class="ms-foot__link" id="discover-link">Discover</button>
          <span class="ms-spacer"></span>
          <button class="ms-foot__link ms-foot__link--strong" id="settings-btn">Settings</button>
        </div>
      </div>
    </div>

    <!-- ⌘K COMMAND BAR OVERLAY -->
    <div id="cmdk-overlay" class="cmdk-overlay hidden" role="dialog" aria-modal="true" aria-label="Switch model">
      <div class="cmdk-card">
        <div class="cmdk-search">
          <svg class="cmdk-search__icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <div class="cmdk-search__field">
            <span id="cmdk-typed" class="cmdk-search__typed"></span><span class="cmdk-search__caret"></span><span id="cmdk-placeholder" class="cmdk-search__placeholder">switch model…</span>
          </div>
          <span class="cmdk-key">ESC</span>
        </div>
        <div class="cmdk-section-label" id="cmdk-section-label">loaded · ready now</div>
        <div class="cmdk-list" id="cmdk-list" role="listbox"></div>
        <div class="cmdk-footer">
          <span class="cmdk-footer__left">
            <span class="cmdk-footer__sq"></span>
            <span id="cmdk-footer-ep">LOCAL · 127.0.0.1:2276/v1</span>
          </span>
          <span class="cmdk-footer__hint">↑↓ NAVIGATE · ⏎ LOAD</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
